[project]
name = "skillseed-mcp"
version = "0.1.0"
description = "SkillSeed MCP Server — FastMCP server for Claude Code integration"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=0.1",
    "httpx>=0.27",
    "skillseed-sdk",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
skillseed-mcp = "server:mcp.run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]
artifacts = ["server.py", "mcp_config.py"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100
