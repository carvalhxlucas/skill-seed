[project]
name = "skillseed-sdk"
version = "0.1.0"
description = "SkillSeed Python SDK — the simplest interface for the SkillSeed network"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "skillseed-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["skillseed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100
