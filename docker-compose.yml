version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: skillseed
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # M-4: use variable instead of hardcoded user
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # B-3: require password for Redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SKILLSEED_API_KEY: ${SKILLSEED_API_KEY}
      SKILLSEED_ADMIN_KEY: ${SKILLSEED_ADMIN_KEY}
      EVAL_THRESHOLD: "0.7"
      ROOT_SEEDER_PATH: /app/seeders
      ENABLE_DOCS: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./seeders:/app/seeders:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
